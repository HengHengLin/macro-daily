name: 每日宏观数据抓取

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装依赖
        run: pip install akshare yfinance requests pandas
      - name: 抓取数据
        run: python fetch_data.py
      - name: 提交数据
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add daily_data.json
          git diff --staged --quiet || git commit -m "数据更新 $(date '+%Y-%m-%d')"
          git push
