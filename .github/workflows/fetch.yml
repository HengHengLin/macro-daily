name: 每日宏观数据抓取

on:
  schedule:
    - cron: '0 1 * * *'  # UTC 01:00 = 北京时间 09:00
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: pip install akshare yfinance requests pandas

      - name: 抓取数据
        run: python fetch_data.py

      - name: 推送飞书摘要
        env:
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
        run: |
          python3 - << 'PYEOF'
          import json, os, requests, datetime

          with open("daily_data.json", "r") as f:
              d = json.load(f)

          mkt = d.get("market", {})
          cn  = d.get("macro_cn", {})
          us  = d.get("macro_us", {})
          rat = d.get("ratios", {})

          def p(key, subkey="price"):
              v = mkt.get(key, {})
              price = v.get("price", "N/A")
              chg   = v.get("change_pct")
              if chg is not None:
                  arrow = "▲" if chg > 0 else "▼"
                  return f"{price}（{arrow}{abs(chg)}%）"
              return str(price)

          def m(obj, *keys):
              for k in keys:
                  if isinstance(obj, dict):
                      obj = obj.get(k, "N/A")
              return str(obj)

          today = datetime.date.today().strftime("%Y-%m-%d")

          msg = f"""📊 宏观日报数据包 {today}

【市场行情】
- 标普500: {p("sp500")}
- 纳斯达克: {p("nasdaq")}
- 沪深300: {p("csi300")}
- 恒生指数: {p("hsi")}
- 黄金: {p("gold")}
- 布伦特油: {p("oil_brent")}
- 美元指数: {p("dxy")}
- 美元/人民币: {p("usdcny")}
- 美债10Y: {p("us10y")}
- VIX: {p("vix")}

【关键比价】
- 油金比: {rat.get("oil_gold_ratio","N/A")}
- 10Y-2Y利差: {rat.get("yield_spread_10_2","N/A")}

【国内宏观】
- CPI同比: {m(cn,"cpi","yoy")}%
- PPI同比: {m(cn,"ppi","yoy")}%
- PMI官方制造: {m(cn,"pmi_official","mfg")}
- PMI财新制造: {m(cn,"pmi_caixin_mfg","value")}
- M1同比: {m(cn,"money_supply","m1_yoy")}%
- M2同比: {m(cn,"money_supply","m2_yoy")}%
- DR007: {m(cn,"dr007","value")}
- Shibor隔夜: {m(cn,"shibor","overnight")}

【美国宏观】
- CPI: {m(us,"cpi","value")}（前值{m(us,"cpi","prev")}）
- 核心CPI: {m(us,"core_cpi","value")}
- 非农: {m(us,"non_farm","value")}万
- 失业率: {m(us,"unemployment","value")}%
- ISM PMI: {m(us,"ism_pmi","value")}

---
📌 复制以上内容到宏观分析 Project，发送「请生成今日日报」"""

          webhook = os.environ.get("LARK_WEBHOOK_URL", "")
          if webhook:
              r = requests.post(webhook, json={
                  "msg_type": "text",
                  "content": {"text": msg}
              })
              print(f"飞书推送: {r.status_code}")
          else:
              print("未配置 LARK_WEBHOOK_URL")
          PYEOF

      - name: 提交数据
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add daily_data.json
          git diff --staged --quiet || git commit -m "数据更新 $(date '+%Y-%m-%d')"
          git push
